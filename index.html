<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Espresso Tracker</title>
    <meta name="theme-color" content="#111827">
    <style>
      :root{color-scheme:dark light}
      body{font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial,Apple Color Emoji,Segoe UI Emoji; 
           background:#0b1020; color:#f8fafc; margin:0; padding:0}
      .container{max-width:1000px;margin:0 auto;padding:24px}
      .card{background:#101935;border:1px solid #1e2a55;border-radius:16px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
      .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
      button{background:#334155;border:none;border-radius:10px;color:#fff;padding:10px 14px;cursor:pointer}
      button.primary{background:#2563eb}
      button:disabled{opacity:.5;cursor:not-allowed}
      input[type=text], input[type=number]{padding:8px 10px;border-radius:10px;border:1px solid #314061;background:#0f172a;color:#e2e8f0}
      select{padding:8px 10px;border-radius:10px;border:1px solid #314061;background:#0f172a;color:#e2e8f0}
      .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#0f172a;border:1px solid #1f2b55}
      .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px}
      .metric{font-size:40px; font-weight:800}
      .metric-sm{font-size:24px; font-weight:700}
      .sub{opacity:.75;font-size:12px}
      .simulator-box{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:180px}
      .sim-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
      .sim-status{font-size:11px;opacity:.65;text-align:right}
      .sim-grid{display:grid;grid-template-columns:repeat(2,minmax(110px,1fr));gap:6px;width:100%;max-width:300px}
      .sim-grid label{display:flex;flex-direction:column;gap:4px;font-size:11px;opacity:.85}
      .sim-check{flex-direction:row !important;align-items:center;gap:6px}
      .footer{opacity:.6;font-size:12px;margin-top:24px;text-align:center}
      .error{background:#7f1d1d;border:1px solid #b91c1c;color:#fecaca;padding:8px 10px;border-radius:10px}
      .small{font-size:12px;opacity:.8}
      .section{margin-top:16px}
      .kbd{background:#0f172a;border:1px solid #1f2b55;border-radius:6px;padding:2px 6px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace}
      .ok{color:#86efac}
      .warn{color:#fde68a}
      .logo{width:56px;height:56px;display:block;border-radius:16px}
      .result-card{padding:16px;display:flex;flex-direction:column;gap:12px}
      .result-title{font-size:14px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;opacity:.85}
      .result-bar{display:flex;flex-direction:column;gap:6px}
      .result-bar-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;opacity:.85}
      .result-bar-label{font-weight:500}
      .result-bar-value{font-variant-numeric:tabular-nums}
      .result-bar-track{height:10px;border-radius:999px;background:rgba(148,163,184,0.25);overflow:hidden}
      .result-bar-fill{height:100%;border-radius:999px;background:#38bdf8}
      .result-stacked{display:flex;flex-direction:column;gap:8px}
      .result-stacked-track{display:flex;height:12px;border-radius:999px;overflow:hidden;background:rgba(148,163,184,0.25)}
      .result-stacked-segment{height:100%}
      .result-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;opacity:.7}
      .legend-item{display:flex;align-items:center;gap:4px}
      .legend-dot{width:8px;height:8px;border-radius:50%}
      .legend-label{line-height:1}
      .result-chips{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;opacity:.75}
      .result-chip{background:rgba(148,163,184,0.2);padding:4px 8px;border-radius:999px}
      .result-chip.subtle{opacity:.6}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
